<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>習格uploader 設定</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Meiryo", "メイリオ", "Hiragino Kaku Gothic ProN", sans-serif;
      background: #f7f8fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 20px;
      font-size: 13px;
    }
    .container { width: 100%; max-width: 460px; }

    .header {
      background: #2563d4;
      border-radius: 6px 6px 0 0;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0;
    }
    .logo {
      width: 32px; height: 32px;
      background: white; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .header h1 { font-size: 14px; font-weight: bold; color: #fff; }
    .header p { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 2px; }

    .card {
      background: #fff;
      border: 1px solid #dde0e8;
      border-top: none;
      padding: 20px 18px;
      margin-bottom: 0;
    }
    .card:last-of-type { border-radius: 0 0 6px 6px; margin-bottom: 14px; }

    .card-title {
      font-size: 12px;
      font-weight: bold;
      color: #2563d4;
      border-bottom: 1px solid #e8eaf0;
      padding-bottom: 8px;
      margin-bottom: 14px;
    }

    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: bold; }

    input {
      width: 100%;
      background: #fff;
      border: 1px solid #c8ccd4;
      border-radius: 4px;
      padding: 7px 10px;
      color: #333;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #2563d4; box-shadow: 0 0 0 2px rgba(37,99,212,0.12); }

    .info-box {
      background: #eef2ff;
      border: 1px solid #c7d4f5;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 12px;
      color: #2563d4;
      line-height: 1.7;
    }

    .btn-primary {
      width: 100%;
      background: #2563d4;
      border: none; border-radius: 4px;
      padding: 9px; color: #fff;
      font-size: 13px; font-weight: bold;
      font-family: inherit; cursor: pointer;
      margin-bottom: 8px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #1a4fbd; }

    .btn-secondary {
      width: 100%;
      background: #fff;
      border: 1px solid #c8ccd4;
      border-radius: 4px; padding: 8px;
      color: #555; font-size: 13px;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #f2f4f8; }

    .status {
      margin-top: 12px; padding: 8px 12px;
      border-radius: 4px; font-size: 12px;
      text-align: center; display: none;
    }
    .status.success { background: #e8f5e9; border: 1px solid #a5d6a7; color: #2e7d32; display: block; }
    .status.error   { background: #ffebee; border: 1px solid #ef9a9a; color: #c62828; display: block; }
    .status.loading { background: #eef2ff; border: 1px solid #c7d4f5; color: #2563d4; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">📸</div>
      <div>
        <h1>習格uploader ver2.4</h1>
        <p>設定 / Settings</p>
      </div>
    </div>

    <div class="card">
      <div class="card-title">認証方式</div>
      <div class="info-box">
        🍪 セッション認証（Cookie）方式<br>
        ブラウザでキントーンにログイン済みであれば、ID/パスワードの入力は不要です。<br>
        ※ 使用前にキントーンへのログインが必要です
      </div>
    </div>

    <div class="card">
      <div class="card-title">ユーザー設定</div>
      <div class="field">
        <label>従業員番号 / Employee ID</label>
        <input type="text" id="employeeId" placeholder="例: 1510">
      </div>
    </div>

    <div class="card">
      <div class="card-title">登録先アプリ</div>
      <div class="info-box">
        対応アプリ（全9種）: 職遂・目標・AI・改善・教育・協力・感謝・環境・方針<br>
        ドメイン: astecpaint.cybozu.com
      </div>
    </div>

    <button class="btn-primary" id="saveBtn">💾 設定を保存</button>
    <button class="btn-secondary" id="testBtn">🔗 接続テスト（要キントーンログイン済み）</button>

    <div class="status" id="status"></div>
    <div style="margin-top:12px; display:flex; gap:8px;">
      <a href="https://astecpaint.cybozu.com/k/#/space/35" target="_blank"
         style="flex:1; display:block; text-align:center; padding:8px; background:#fff; border:1px solid #c8ccd4; border-radius:4px; color:#2563d4; font-size:12px; text-decoration:none;">
        🏠 キントーン スペース
      </a>
      <a href="chrome-extension://ofkleeefmfigghphjggdciohagajeoho/options.html" target="_blank"
         style="flex:1; display:block; text-align:center; padding:8px; background:#fff; border:1px solid #c8ccd4; border-radius:4px; color:#555; font-size:12px; text-decoration:none;">
        ⚙️ この設定画面
      </a>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
